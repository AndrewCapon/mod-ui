<h3 class="mod-help-title">Pedalboard Zoom Controls</h3>

<div style="padding: 12px; text-align: center;">
    <img src="help/img/pedalboard-zoom.png" alt="Pedalboard zoom" class="help-image">
</div>

<div>
    <ul>
        <li><strong>Zoom Out (Magnifying glass with minus):</strong> Shrinks the view to see more pedals on the canvas at once.</li>
        <li><strong>Zoom In (Magnifying glass with plus):</strong> Enlarges the view to focus on details and individual pedal controls.</li>
    </ul>
</div>

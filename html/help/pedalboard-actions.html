<h3 class="mod-help-title">Pedalboard Actions</h3>

<div style="padding: 12px; text-align: center;">
    <img src="help/img/pedalboard-actions.png" alt="Pedalboard actions" class="help-image">
</div>

<ul>
    <li><strong>Save:</strong> Overwrites the current pedalboard with the latest changes.</li>
    <li><strong>Save As:</strong> Saves a new copy of the pedalboard, allowing you to change its name.</li>
</ul>

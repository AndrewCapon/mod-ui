<div class="plugin available-plugin js-available-effect plugin-container" mod-role="available-plugin" mod-uri="{{{uri}}}">
    <span class="icon-visible"></span>
    <div class="thumb">
        {{#demo}}
        <div class="demo-plugin demo-mask" title="This plugin is for demo purposes only and shall not be used live or in a studio"></div>
        {{/demo}}
        <img src="{{{thumbnail_href}}}">
    </div>
    <div class="label-container">
        <span class="title">{{{label}}}</span>
        <span class="icon icon-pencil mod-hidden"></span>
    </div>
</div>
